<!DOCTYPE html>
<html>
<body style="font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px;">
  <h1>📧 Submit Support Ticket</h1>
  <form id="form">
    <div style="margin: 15px 0;">
      <label>Name:</label><br>
      <input type="text" name="name" style="width: 100%; padding: 8px;" required>
    </div>
    <div style="margin: 15px 0;">
      <label>Email:</label><br>
      <input type="email" name="email" style="width: 100%; padding: 8px;" required>
    </div>
    <div style="margin: 15px 0;">
      <label>Subject:</label><br>
      <input type="text" name="subject" style="width: 100%; padding: 8px;" required>
    </div>
    <div style="margin: 15px 0;">
      <label>Message:</label><br>
      <textarea name="message" rows="5" style="width: 100%; padding: 8px;" required></textarea>
    </div>
    <button type="submit" style="background: #007bff; color: white; padding: 12px 30px; border: none; cursor: pointer;">
      Submit Ticket
    </button>
  </form>
  <div id="msg"></div>

  <script>
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        name: e.target.name.value,
        email: e.target.email.value,
        subject: e.target.subject.value,
        message: e.target.message.value
      };


      const url = 'https://n8npraizdev.dpdns.org/webhook-test/support-ticket';

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      document.getElementById('msg').innerHTML =
        '<p style="color: green; margin-top: 20px;">✅ Ticket submitted successfully!</p>';
      e.target.reset();
    };
  </script>
</body>
</html>
